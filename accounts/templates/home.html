<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        /* Global Styles */
        body {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 250px;
            background: linear-gradient(135deg, #4CAF50, #77DD77);
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .sidebar .profile {
            text-align: center;
            margin-bottom: 20px;
        }

        .sidebar .profile img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid white;
        }

        .sidebar a {
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            padding: 10px;
            width: 100%;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
        }

        .sidebar i {
            margin-right: 10px;
        }

        .footer {
            position: absolute;
            bottom: 10px;
            font-size: 12px;
            text-align: center;
            color: white;
        }

        /* Main Content */
        .content {
            flex: 1;
            padding: 20px;
            background: #f8f9fa;
            overflow-y: auto;
        }

        /* Dashboard Cards */
        .dashboard-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            justify-content: center;
        }

        .card {
            background: linear-gradient(135deg, #4CAF50, #77DD77);
            color: white;
            text-align: center;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .card i {
            font-size: 24px;
            margin-bottom: 10px;
        }

        /* Logout Button */
        .logout-btn {
            margin-top: 20px;
            width: 10%;
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            justify-content: center;
        }

        .logout-btn:hover {
            background: #c82333;
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="profile">
            <img src="https://via.placeholder.com/80" alt="Profile Picture">
            <h5>{{ user.username }}</h5>
        </div>
        <a href="#"><i class="fas fa-home"></i> Home</a>
        <a href="#"><i class="fas fa-box"></i> Products</a>
        <a href="#"><i class="fas fa-users"></i> Users</a>
        <a href="#"><i class="fas fa-shopping-bag"></i> Orders</a>
        <a href="#"><i class="fas fa-store"></i> Shop</a>
        <a href="#"><i class="fas fa-tools"></i> Utilities</a>
        <a href="#"><i class="fas fa-book"></i> Library</a>
        <a href="#"><i class="fas fa-cogs"></i> Equipments</a>
        <a href="#"><i class="fas fa-user-cog"></i> Account</a>
        
        <div class="footer">&copy; 2025 ShopMe</div>
    </div>

    <!-- Main Content -->
    <div class="content">
        <h3>Welcome back, {{ user.username }} 😎</h3>
        <p>Today's date: {{ current_date }}</p>

        <!-- Dashboard Cards -->
        <div class="dashboard-cards">
            <div class="card">
                <i class="fas fa-box"></i>
                <h5>Products</h5>
                <h2>1</h2>
            </div>
            <div class="card">
                <i class="fas fa-users"></i>
                <h5>Users</h5>
                <h2>2</h2>
            </div>
            <div class="card">
                <i class="fas fa-shopping-bag"></i>
                <h5>Orders</h5>
                <h2>3</h2>
            </div>
            <div class="card">
                <i class="fas fa-store"></i>
                <h5>Shop</h5>
                <h2>4</h2>
            </div>
            <div class="card">
                <i class="fas fa-tools"></i>
                <h5>Utilities</h5>
                <h2>5</h2>
            </div>
            <div class="card">
                <i class="fas fa-book"></i>
                <h5>Library</h5>
                <h2>6</h2>
            </div>
            <div class="card">
                <i class="fas fa-cogs"></i>
                <h5>Equipments</h5>
                <h2>7</h2>
            </div>
        </div>

        <!-- Logout Button -->
        <form action="{% url 'logout' %}" method="post">
            {% csrf_token %}
            <button type="submit" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </form>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
